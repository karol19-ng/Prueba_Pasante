<!DOCTYPE html>
<html>
<head>
    <title>Prueba - Asistente Municipal</title>
</head>
<body>
    <h1>Prueba - Asistente Municipal</h1>
    <p>Abre el chat abajo a la derecha.</p>

    <script>
    var LHC_API = LHC_API||{};
    LHC_API.args = {
        mode:'widget',
        lhc_base_url:'//www.muniparaiso.go.cr/app/webroot/chat/',
        wheight:450,
        wwidth:350,
        pheight:520,
        pwidth:500,
        leaveamessage:true,
        check_messages:false
    };
    (function() {
        var po = document.createElement('script'); 
        po.type = 'text/javascript'; 
        po.setAttribute('crossorigin','anonymous'); 
        po.async = true;
        var date = new Date();
        po.src = '//www.muniparaiso.go.cr/app/webroot/chat/design/defaulttheme/js/widgetv2/index.js?'+(""+date.getFullYear() + date.getMonth() + date.getDate());
        var s = document.getElementsByTagName('script')[0]; 
        s.parentNode.insertBefore(po, s);
    })();
    </script>

</body>
</html>
